project:
  type: website
  output-dir: ../_docs
  execute-dir: project
  render:
    - index.ipynb
    - 00_forensicface.ipynb
    - 01_utils.ipynb
    - api.qmd

execute:
  freeze: auto
  echo: true

format:
  html:
    theme: cosmo
    css: styles.css
    toc: true

website:
  title: "forensicface"
  site-url: "https://rafribeiro.github.io/forensicface"
  description: "A package for forensic face examination"
  repo-url: "https://github.com/rafribeiro/forensicface"
  repo-branch: main
  repo-actions: [issue]
  twitter-card: true
  open-graph: true
  navbar:
    background: primary
    search: true
  sidebar:
    style: floating
    contents:
      - index.ipynb
      - 00_forensicface.ipynb
      - 01_utils.ipynb
      - api.qmd
