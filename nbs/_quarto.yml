project:
  type: website
  output-dir: ../_docs
  execute-dir: project
  render:
    - index.ipynb
    - 00_forensicface.ipynb
    - 01_utils.ipynb
    - api/*.qmd
    - api.qmd

execute:
  freeze: auto
  echo: true

format:
  html:
    theme: cosmo
    css: styles.css
    toc: true

website:
  title: "forensicface"
  site-url: "https://rafribeiro.github.io/forensicface"
  description: "A package for forensic face examination"
  repo-url: "https://github.com/rafribeiro/forensicface"
  repo-branch: main
  repo-actions: [issue]
  twitter-card: true
  open-graph: true
  navbar:
    background: primary
    search: true
  sidebar:
    style: floating
    contents:
      - index.ipynb
      - 00_forensicface.ipynb
      - 01_utils.ipynb
      - api.qmd

quartodoc:
  package: forensicface
  source_dir: src
  dir: api
  sections:
    - title: Core
      desc: Public API for forensicface.
      contents:
        - app
        - backends
        - geometry
        - model_store
        - mosaic
        - ort_runtime_setup
        - preprocessing
        - recognition
        - results
        - runtime_summary
        - utils
        - video
    - title: Insightface Internals
      desc: Internal components vendored from insightface.
      contents:
        - insightface.attribute
        - insightface.face_align
        - insightface.landmark
        - insightface.meanshape68
        - insightface.scrfd
        - insightface.transform
  options:
    signature_name: relative
    include_private: false
    include_inherited: false
  parser: google
  renderer:
    style: markdown
    table_style: description-list
