name: Docs

on:
  push:
    branches: ["main", "master"]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Sync dependencies
        run: uv sync --extra dev --extra docs

      - name: Build API reference and site
        run: ./scripts/build_docs_ci.sh

      - name: Publish to Pages branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          publish_dir="$(mktemp -d)"
          git init "$publish_dir"
          cp -a _docs/. "$publish_dir/"
          touch "$publish_dir/.nojekyll"
          cd "$publish_dir"
          git checkout --orphan gh-branch
          git add -A
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "Publish docs from ${GITHUB_REF_NAME}"
          git push --force "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:gh-branch
